name: Update GitHub Activity Feed

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically at the top of every hour
  workflow_dispatch: # Adds a button so you can run it manually in the Actions tab

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed so the Action can commit the file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node fetch-github.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-activity.json
          # Only commit if the data actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update github activity feed" && git push)